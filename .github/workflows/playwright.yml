name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        config: [
          { name: 'main-regression-suite', file: 'playwright.config.js' },
          { name: 'local-shop-suite', file: 'playwright.local.config.js' },
          { name: 'parallel-proof-suite', file: 'Playwright.parallels.config.js' },
          { name: 'parallel-demo-suite', file: 'Playwright.parallel.config.js' }
        ]
    name: ${{ matrix.config.name }}
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_ENV

    - name: Cache Playwright Binaries
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers & Deps
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Install Playwright System Dependencies (if cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps

    - name: Run Playwright tests
      run: npx playwright test --config=${{ matrix.config.file }}

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-html-report-${{ matrix.config.name }}
        path: |
          playwright-report/
          playwright-html-report/
        if-no-files-found: ignore
        retention-days: 14

  merge-reports:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
    - name: Download all reports
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        path: all-reports
        pattern: playwright-html-report-*
        merge-multiple: false

    - name: Upload Combined Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: combined-playwright-html-report
        path: all-reports/
        if-no-files-found: ignore
        retention-days: 14

