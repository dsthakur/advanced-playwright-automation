name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        config: [
          { name: 'main-regression-suite', file: 'playwright.config.js' },
          { name: 'local-shop-suite', file: 'playwright.local.config.js' },
          { name: 'parallel-proof-suite', file: 'Playwright.parallels.config.js' }
        ]
    name: ${{ matrix.config.name }}
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_ENV

    - name: Cache Playwright Binaries
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers & Deps
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Install Playwright System Dependencies (if cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps

    - name: Run Playwright tests
      run: npx playwright test --config=${{ matrix.config.file }}

    - name: Load Allure history
      uses: actions/checkout@v4
      if: always() && matrix.config.file == 'playwright.config.js'
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Ensure gh-pages directory exists
      if: always() && matrix.config.file == 'playwright.config.js'
      run: mkdir -p gh-pages

    - name: Build Allure Report with History
      uses: simple-elf/allure-report-action@v1
      if: always() && matrix.config.file == 'playwright.config.js'
      id: allure-report
      with:
        allure_results: my-allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history

    - name: Deploy Allure report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always() && matrix.config.file == 'playwright.config.js'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history
        publish_branch: gh-pages
        force_orphan: true


    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-html-report-${{ matrix.config.name }}
        path: |
          playwright-report/
          playwright-html-report/
        if-no-files-found: ignore
        retention-days: 14

    - name: Upload Local Allure Report Directory (as backup)
      uses: actions/upload-artifact@v4
      if: always() && matrix.config.file == 'playwright.config.js'
      with:
        name: allure-report-${{ matrix.config.name }}
        path: allure-report/
        if-no-files-found: ignore
        retention-days: 14

